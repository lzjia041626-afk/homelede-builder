name: 编译 ImmortalWrt 旁路由固件

on:
  workflow_dispatch:
    inputs:
      ssh_debug:
        description: '开启 SSH 调试'
        required: true
        default: 'false'
        type: boolean

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git # 使用 immortalwrt 官方源码
  REPO_BRANCH: openwrt-25.12 # 推荐使用稳定分支
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  TZ: Asia/Shanghai
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 初始化环境
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-distutils rsync unzip zlib1g-dev file wget

      - name: 克隆源码
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 加载自定义配置
        run: |
          cp -f $GITHUB_WORKSPACE/.config openwrt/.config
          cd openwrt
          make defconfig

      - name: 下载编译依赖
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: 编译固件
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: 打包固件
        run: |
          mkdir -p $GITHUB_WORKSPACE/firmware
          cp openwrt/bin/targets/x86/64/*.img.gz $GITHUB_WORKSPACE/firmware/ 2>/dev/null || true
          cp openwrt/bin/targets/x86/64/*.vmdk $GITHUB_WORKSPACE/firmware/ 2>/dev/null || true

      - name: 上传固件 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-Firmware
          path: firmware/

      - name: 创建 Release
        if: success() && env.UPLOAD_RELEASE == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: ImmortalWrt 固件构建 #${{ github.run_number }}
          files: firmware/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
