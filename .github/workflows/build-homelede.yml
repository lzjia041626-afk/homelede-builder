name: 编译 ImmortalWrt 旁路由固件

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-23.05          # 稳定分支
  CONFIG_FILE: .config
  TZ: Asia/Shanghai
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 强制使用 Node.js 24，消除警告

    steps:
      - name: 检出代码
        uses: actions/checkout@v5                 # 升级至 v5

      - name: 初始化编译环境
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-distutils rsync unzip zlib1g-dev file wget

      - name: 克隆源码并加速下载
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          # 使用国内镜像加速 feeds 下载
          sed -i 's/https:\/\/git.openwrt.org\/feed\/packages.git/https:\/\/mirrors.tuna.tsinghua.edu.cn\/openwrt\/packages.git/g' feeds.conf.default
          sed -i 's/https:\/\/git.openwrt.org\/project\/luci.git/https:\/\/mirrors.tuna.tsinghua.edu.cn\/openwrt\/luci.git/g' feeds.conf.default
          sed -i 's/https:\/\/github.com\/immortalwrt\/packages.git/https:\/\/mirror.ghproxy.com\/https:\/\/github.com\/immortalwrt\/packages.git/g' feeds.conf.default
          sed -i 's/https:\/\/github.com\/immortalwrt\/luci.git/https:\/\/mirror.ghproxy.com\/https:\/\/github.com\/immortalwrt\/luci.git/g' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 加载自定义配置
        run: |
          cp -f $GITHUB_WORKSPACE/.config openwrt/.config
          cd openwrt
          make defconfig

      - name: 下载编译依赖（带重试与加速）
        run: |
          cd openwrt
          # 设置下载镜像站为国内源
          export DOWNLOAD_MIRROR="https://mirrors.tuna.tsinghua.edu.cn/openwrt"
          # 增加重试次数避免 "Too many retries"
          make download -j$(nproc) V=s DOWNLOAD_RETRIES=10

      - name: 编译固件
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: 打包固件
        run: |
          mkdir -p $GITHUB_WORKSPACE/firmware
          cp openwrt/bin/targets/x86/64/*.img.gz $GITHUB_WORKSPACE/firmware/ 2>/dev/null || true
          cp openwrt/bin/targets/x86/64/*.vmdk $GITHUB_WORKSPACE/firmware/ 2>/dev/null || true

      - name: 上传固件 (Artifact)
        uses: actions/upload-artifact@v5           # 升级至 v5
        with:
          name: ImmortalWrt-Firmware
          path: firmware/

      - name: 创建 Release
        if: success() && env.UPLOAD_RELEASE == 'true'
        uses: softprops/action-gh-release@v2      # 升级至 v2
        with:
          tag_name: build-${{ github.run_number }}
          name: ImmortalWrt 固件构建 #${{ github.run_number }}
          files: firmware/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
