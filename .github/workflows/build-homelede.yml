name: 编译 ImmortalWrt 旁路由固件

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-23.05
  TZ: Asia/Shanghai
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 检出代码（仅用于获取工作流文件）
        uses: actions/checkout@v5

      - name: 初始化编译环境
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-distutils rsync unzip zlib1g-dev file wget

      - name: 克隆源码（带镜像加速）
        run: |
          git config --global http.postBuffer 524288000
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          # 使用 ghproxy 镜像加速 feeds
          sed -i 's|https://git.openwrt.org/feed/packages.git|https://mirror.ghproxy.com/https://github.com/openwrt/packages.git|g' feeds.conf.default
          sed -i 's|https://git.openwrt.org/project/luci.git|https://mirror.ghproxy.com/https://github.com/openwrt/luci.git|g' feeds.conf.default
          sed -i 's|https://github.com/immortalwrt/packages.git|https://mirror.ghproxy.com/https://github.com/immortalwrt/packages.git|g' feeds.conf.default
          sed -i 's|https://github.com/immortalwrt/luci.git|https://mirror.ghproxy.com/https://github.com/immortalwrt/luci.git|g' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成基础配置并增量添加软件包
        run: |
          cd openwrt
          
          # 1. 生成 x86_64 默认配置
          cat > .config <<EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y
          CONFIG_TARGET_ROOTFS_EXT4FS=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          EOF
          
          make defconfig
          
          # 2. 使用 sed 追加必须的 LuCI 中文和主题
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-base=y" >> .config
          echo "CONFIG_PACKAGE_luci-compat=y" >> .config
          echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-opkg-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-theme-argon=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-argon-config=y" >> .config
          
          # 3. 核心三件套（注意包名必须与 feeds 中完全一致）
          # mosdns
          echo "CONFIG_PACKAGE_mosdns=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-mosdns=y" >> .config
          echo "CONFIG_PACKAGE_v2ray-geoip=y" >> .config
          echo "CONFIG_PACKAGE_v2ray-geosite=y" >> .config
          
          # AdGuardHome
          echo "CONFIG_PACKAGE_adguardhome=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-adguardhome=y" >> .config
          
          # Nikki (Mihomo)
          echo "CONFIG_PACKAGE_nikki=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-nikki=y" >> .config
          echo "CONFIG_PACKAGE_iptables-mod-tproxy=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nft-tproxy=y" >> .config
          
          # 4. 运行 defconfig 解析依赖（捕获详细错误）
          echo "===== 正在解析依赖，如有错误将在此处显示 ====="
          make defconfig V=sc 2>&1 | tee defconfig.log
          
          # 5. 检查是否成功
          if grep -q "Error" defconfig.log; then
            echo "❌ 配置阶段出现错误，请查看上方日志。"
            exit 1
          fi
          
          echo "✅ 配置解析完成，当前选中包如下："
          grep -E "^CONFIG_PACKAGE_(mosdns|adguardhome|nikki|luci-app-mosdns|luci-app-adguardhome|luci-app-nikki)=" .config

      - name: 下载编译依赖
        run: |
          cd openwrt
          make download -j$(nproc) V=s DOWNLOAD_RETRIES=10

      - name: 编译固件
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: 打包固件
        run: |
          mkdir -p $GITHUB_WORKSPACE/firmware
          cp openwrt/bin/targets/x86/64/*.img.gz $GITHUB_WORKSPACE/firmware/ 2>/dev/null || true
          cp openwrt/bin/targets/x86/64/*.vmdk $GITHUB_WORKSPACE/firmware/ 2>/dev/null || true

      - name: 上传固件 (Artifact)
        uses: actions/upload-artifact@v5
        with:
          name: ImmortalWrt-Firmware
          path: firmware/

      - name: 创建 Release
        if: success() && env.UPLOAD_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: ImmortalWrt 固件构建 #${{ github.run_number }}
          files: firmware/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
